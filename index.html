<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quotes Chatbot</title>
    <style>
      /* Modern Background Gradient */
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      /* Glassmorphism Card Container */
      .chat-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        width: 450px;
        height: 600px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        overflow: hidden;
      }

      .chat-header {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        text-align: center;
        color: white;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .chat-header h2 {
        margin: 0;
        font-size: 1.5rem;
      }

      /* Chat History Styling */
      #chat-container {
        flex-grow: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* Scrollbar Styling */
      #chat-container::-webkit-scrollbar {
        width: 6px;
      }
      #chat-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }

      .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 15px;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .user-msg {
        align-self: flex-end;
        background: #fff;
        color: #4a148c;
        border-bottom-right-radius: 2px;
      }

      .bot-msg {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-bottom-left-radius: 2px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Input Area */
      .input-area {
        padding: 20px;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        gap: 10px;
      }

      input {
        flex-grow: 1;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        padding: 12px 20px;
        color: white;
        outline: none;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      button {
        background: white;
        color: #764ba2;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        background: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <div class="chat-card">
      <div class="chat-header">
        <h2>Daily Inspiration</h2>
        <small style="color: rgba(255, 255, 255, 0.7)"
          >Your AI Quote Companion</small
        >
      </div>

      <div id="chat-container"></div>

      <div class="input-area">
        <input id="msg" type="text" placeholder="Tell me your mood..." />
        <button onclick="send()">Send</button>
      </div>
    </div>

    <script>
      function send() {
        const msgInput = document.getElementById("msg");
        const userText = msgInput.value;
        const chatContainer = document.getElementById("chat-container");

        if (!userText) return;

        // Add User Message
        chatContainer.innerHTML += `<div class="message user-msg">${userText}</div>`;
        msgInput.value = "";

        fetch("http://localhost:5005/webhooks/rest/webhook", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sender: "user", message: userText }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data && data.length > 0) {
              data.forEach((item) => {
                chatContainer.innerHTML += `<div class="message bot-msg">${item.text}</div>`;
              });
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
          })
          .catch((err) => {
            console.error(err);
            chatContainer.innerHTML += `<div class="message bot-msg" style="color: #ff8a80;">Error: Check Rasa Server.</div>`;
          });
      }

      document.getElementById("msg").addEventListener("keypress", (e) => {
        if (e.key === "Enter") send();
      });
    </script>
  </body>
</html>
